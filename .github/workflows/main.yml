name: Build Android APK (Capacitor)

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Web App & APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Web Dependencies
        run: npm ci || npm install

      - name: Build Web Application
        run: npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor Android
        run: |
          # Instala dependências do Capacitor necessárias para a build
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # Inicializa o Capacitor se o projeto Android não existir, senão apenas sincroniza
          if [ ! -d "android" ]; then
            npx cap init "Controle Financeiro" "com.controle.financeiro" --web-dir=dist
            npx cap add android
          fi
          npx cap sync android

      - name: Fix Kotlin stdlib duplicate classes
        run: |
          # Injeta a resolução de conflito no build.gradle do projeto Android.
          # A partir do Kotlin 1.8, kotlin-stdlib-jdk7 e kotlin-stdlib-jdk8 foram fundidos
          # na biblioteca principal. Este bloco força todas as dependências Kotlin
          # para a mesma versão, eliminando os erros de "Duplicate class".
          cat >> android/build.gradle << 'EOF'

          allprojects {
              configurations.all {
                  resolutionStrategy {
                      force "org.jetbrains.kotlin:kotlin-stdlib:1.8.22"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22"
                  }
              }
          }
          EOF

      - name: Cache Gradle files
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
