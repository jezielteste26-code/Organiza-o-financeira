name: Build Android APK (Capacitor)

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Web App & APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Web Dependencies
        run: npm ci || npm install

      - name: Build Web Application
        run: npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor Android
        run: |
          # Instala dependências do Capacitor necessárias para a build
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # Inicializa o Capacitor se o projeto Android não existir, senão apenas sincroniza
          if [ ! -d "android" ]; then
            npx cap init "Controle Financeiro" "com.controle.financeiro" --web-dir=dist
            npx cap add android
          fi
          npx cap sync android

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
